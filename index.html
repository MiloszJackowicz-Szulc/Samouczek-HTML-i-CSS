<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samouczek HTML i CSS</title>

<style>

header{
    background-color:#111;
    padding:20px;
    border-bottom:3px solid #00bfff;
}

header h1{
    margin:0;
}

.przyciski{
    margin-top:50px;
}

.przycisk{
    display:inline-block;
    width:250px;
    padding:40px 0;
    margin:20px;
    background-color:#2f2f46;
    color:white;
    text-decoration:none;
    font-size:32px;
    font-weight:bold;
    border-radius:15px;
}

.przycisk:hover{
    background-color:#00bfff;
}

body{
    margin:0;
    font-family:Arial;
    background-color:#1e1e2f;
    color:white;
    text-align:center;

    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.glowny{
    width:80%;
    margin:auto;
    margin-top:40px;
    flex:1;
}

.stopka{
    background-color:#111;
    padding:20px;
}

@media (max-width: 768px){

    header h1{
        font-size:28px;
    }

    .glowny{
        width:95%;
        margin-top:20px;
    }

    .przyciski{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:15px;
    }

    .przycisk{
        width:90%;
        max-width:300px;
        margin:0;
        font-size:28px;
        padding:30px 0;
    }

    .stopka{
        font-size:14px;
        padding:15px;
    }

}
</style>

</head>
<body>

<header>
    <h1>Samouczek HTML i CSS</h1>
</header>

<div class="glowny">

    <p>
        Ta strona jest samouczkiem HTML i CSS poznanych w 1 klasie technikum.
        Celem strony jest powtórka materiału przed egzaminem INF03.
    </p>

    <div class="przyciski">

        <a href="html.html" class="przycisk">
            HTML
        </a>

        <a href="css.html" class="przycisk">
            CSS
        </a>

    </div>

</div>

<div class="stopka">
    Strona wykonana przez Miłosza Jackowicza-Szulca
</div>

</body>
</html>
